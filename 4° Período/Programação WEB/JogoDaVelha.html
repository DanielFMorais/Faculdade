<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da velha</title>

    <style>
        table {
            width: 550px;
            height: 350px;
            border: 1px solid black;
        }

        table tr {
            background-color: red;
            font: bold 46px verdana;
            color: white;
        }

        table tr td {
            text-align: center;
            width: 33.33%;
        }

        table tr td :hover {
            cursor: pointer;
        }

        input[type=botton] {
            width: 150px;
            height: 50px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        fieldset {
            font-size: 20px;
            font-weight: bold;
            border: 2px solid blue;
            width: 300px;
            margin-bottom: 25px;
        }
    </style>

    <script>
        //deixa a div do jogo escondida no momento que a página é carregada
        window.onload = function () { document.getElementById('game').style.visibility = 'hidden'}

        //cria um objeto do jogador
        function Jogador (nome,forma){
            this.nome = nome;
            this.forma = forma;
        }
        //variaveis que armanezarão os dados dos jogadores 
        var jogador1, jogador2
        //jogador da rodada
        var jogadorAtual;
        var formas = ['X', 'O']
        /* 
        0 1 2
        3 4 5
        6 7 8        
        */

        var tabuleiro = new Array(9);

        initGame = function() {
            var nomeJogador1 = document.getElementById('jogador1').value;
            var nomeJogador2 = document.getElementById('jogador2').value;

            jogador1 = new Jogador(nomeJogador1, 0); //X
            jogador2 = new Jogador(nomeJogador2, 1); //O

            jogadorAtual = jogador1;
            setLabelJogadorAtual();

            //APOS DEFINIÇÃO DE JOGADORES, EXIBE A DIV E INICIA Jogo
            document.getElementById('game').style.visibility = 'visible';            
        }

        //reinicia a partida

        reset = function() {
            window.location.reload();
        }

        //seta o nome do jogador da rodada na pagina html
        setLabelJogadorAtual = function (){
            document.getElementById('jogadorAtual').innerHTML = 'Jogador Atual : ' +  jogadorAtual.nome;
        }

        setOnCeil = function (cel, pos) {
            if (tabuleiro[pos] == undefined) {
                cel.innerHTML = formas[jogadorAtual.forma];
                tabuleiro[pos] = formas[jogadorAtual.forma];

                //define o jogador da rodada
                (jogadorAtual.forma == 0) ? jogadorAtual = jogador2 : jogadorAtual = jogador1

                setLabelJogadorAtual();
            } else alert(
                'Ops. Already marked value for this'
            )
        }

        
    </script>
</head>
<body>
    <fieldset>
        <legend>Jogadores</legend>
        <label for="Jogador 1">Jogador 1</label>
        <input type="text"  id="jogador1">
        <label for="Jogador 2">Jogador 2</label>
        <input type="text"  id="jogador2">
        <input type="button" value="Iniciar" style="margin-top:4px;height:25px;width:150px;font-size:14px;" onclick = "javascript:initGame();">

        
    </fieldset>
    <h3 id="jogadorAtual"></h3>
    
    <div id="game">
        <table cellpadding="0" cellspacing="1">
            <tr border="1">
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
            </tr>
            
            <tr border="1">
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
            </tr>
    
            <tr border="1">
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
                <td onmouseover="javascript: this.style.backgroudcolor ='blue'"
                onmouseout="javascript: this.style.backgroudcolor = 'red'"
                >&nbsp;</td>
            </tr>
    
        </table>

    </div>
</body>
</html>

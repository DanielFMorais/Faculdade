<!-- Lista Ordenada
 
esta é uma lista onde os itens são numerados ou ordenados de acordo com um critério específico. 
A estrutura é definida pela tag <ol> (ordered list) e cada item é definido pela tag <li> (list item). 
O tipo de numeração pode ser personalizado usando o atributo "type" na tag <ol>.

<ol> type="1" start="Numero inicial"
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
</ol>

Tipos -> 1 = algoritmo arábicos (defaut)
        I ou i = algarismos romanos maiúsculos ou minúsculos
        A ou a = letras maiúsculas ou minúsculas


------------------------------------------
Lista  Não Ordenada

esta é a lista mais simples, onde os itens são marcados por um símbolo, sem uma ordem específica. 
A estrutura é definida pela tag <ul> (unordered list) e cada item é definido pela tag <li> (list item). 
O tipo de marcador pode ser personalizado usando o atributo "type" na tag <ul>.

<ul> type="Tipo de marcador"
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
</ul>

Tipos -> disc = marcador preenchido (defaut)
        circle = marcador vazio
        square = marcador quadrado

-------------------------------------

Lista de Definição

Esta possui uma estrutura diferente das anteriores, onde cada item é composto por um termo e sua definição. 
O termo é definido pela tag <dt> e a definição pela tag <dd>.
<dl>
    <dt>Termo 1</dt>
    <dd>Definição do termo 1</dd>

    <dt>Termo 2</dt>
    <dd>Definição do termo 2</dd>

    <dt>Termo 3</dt>
    <dd>Definição do termo 3</dd>
</dl>

--------------------------------------
links

<a href="URL do destino">Texto do link</a>


-->
